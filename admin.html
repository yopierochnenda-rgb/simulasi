<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score - SPENSANECI 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* Tema Terang untuk Podium */
        .peringkat-1 { background: linear-gradient(to right, #fffbeb, #fef3c7); color: #92400e; transform: scale(1.01); border: 1px solid #fde68a; }
        .peringkat-2 { background: linear-gradient(to right, #f8fafc, #f1f5f9); color: #334155; border: 1px solid #e2e8f0; }
        .peringkat-3 { background: linear-gradient(to right, #fff7ed, #ffedd5); color: #9a3412; border: 1px solid #fed7aa; }
        
        .bar-animasi { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-6">
    
    <header class="text-center mb-8 flex flex-col items-center mt-4">
        <!-- LOGO KIRI & KANAN -->
        <div class="flex justify-center items-center gap-5 mb-5">
            <img src="./logo.png" alt="Logo 1" class="w-16 h-16 md:w-20 md:h-20 object-contain bg-white rounded-full shadow-sm p-1.5 border border-slate-200">
            <img src="./logo2.png" alt="Logo 2" class="w-20 h-20 md:w-24 md:h-24 object-contain drop-shadow-md">
        </div>

        <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500 uppercase tracking-widest drop-shadow-sm">
            LIVE SCORE
        </h1>
        <p class="text-slate-600 mt-2 font-bold tracking-wide">LOMBA MATA PELAJARAN HUT SPENSANECI 57</p>
        
        <div class="mt-4 inline-flex items-center bg-white border border-slate-200 shadow-sm rounded-full px-4 py-1.5 text-xs text-indigo-600 font-bold">
            <span class="w-2 h-2 rounded-full bg-indigo-500 animate-ping mr-2.5"></span>
            Terhubung ke Database (Auto-Refresh 3s)
        </div>
    </header>

    <main class="flex-grow max-w-5xl w-full mx-auto">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <!-- HEADER TABEL -->
            <div class="grid grid-cols-12 gap-4 p-4 bg-slate-100 border-b border-slate-200 font-bold text-slate-500 text-xs md:text-sm uppercase tracking-wider items-center">
                <div class="col-span-1 text-center">Rank</div>
                <div class="col-span-4 md:col-span-4">Identitas Peserta</div>
                <div class="col-span-5 md:col-span-5 text-center">Grafik Progres Nilai</div>
                <div class="col-span-2 md:col-span-2 text-right">Skor Total</div>
            </div>
            
            <div id="papanSkor" class="flex flex-col relative min-h-[300px]">
                <div class="absolute inset-0 flex flex-col items-center justify-center text-indigo-500">
                    <i class="fas fa-circle-notch fa-spin text-4xl mb-3"></i>
                    <p class="text-sm text-slate-500 font-semibold animate-pulse">Memuat data real-time...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full text-center p-4 text-xs font-semibold text-slate-400 mt-6">&copy; 2026 Panitia HUT SPENSANECI 57.</footer>

    <script>
        const URL_GOOGLE_SHEET = "https://script.google.com/macros/s/AKfycbzRHQYR_71ygdOjv5GFnbp04uvxNR_IU_GrVAo7OXyoU-p20bAzzFy4f_I4ZEka3VnK/exec";
        
        // 🛠️ UBAH TOTAL SOAL DI SINI AGAR PANJANG LOADING BAR SESUAI (100%)
        const TOTAL_SOAL = 40; 

        async function muatDataLeaderboard() {
            try {
                const respon = await fetch(URL_GOOGLE_SHEET + "?p=leaderboard");
                const dataMentah = await respon.json();
                
                const wadahPapan = document.getElementById('papanSkor');

                if (!dataMentah || dataMentah.length === 0) {
                    wadahPapan.innerHTML = `<div class="p-8 text-center text-slate-500 italic">Belum ada peserta yang mengumpulkan skor.</div>`;
                    return;
                }

                // 🔥 ANTI-DOBEL TINGKAT TINGGI (Menghapus spasi gaib & menyamakan huruf)
                let dataSaring = {};
                dataMentah.forEach(item => {
                    const noClean = item.noPeserta ? item.noPeserta.toString().trim().toLowerCase() : "";
                    const namaClean = item.namaPeserta ? item.namaPeserta.toString().trim().toLowerCase() : "";
                    const sekolahClean = item.asalSekolah ? item.asalSekolah.toString().trim().toLowerCase() : "";
                    
                    const idUnik = noClean || (namaClean + "_" + sekolahClean);
                    if (!idUnik || idUnik === "_") return;

                    const skorAngka = parseInt(item.skor) || 0;

                    if (!dataSaring[idUnik] || skorAngka > (parseInt(dataSaring[idUnik].skor) || 0)) {
                        dataSaring[idUnik] = item;
                    }
                });

                const dataPeserta = Object.values(dataSaring).sort((a, b) => (parseInt(b.skor) || 0) - (parseInt(a.skor) || 0));

                wadahPapan.innerHTML = ""; 

                dataPeserta.forEach((peserta, index) => {
                    let gayaKhusus = "";
                    let ikonMahkota = "";
                    let warnaBatang = ""; 
                    let bgTrekBatang = "";
                    
                    const persentase = Math.min(((parseInt(peserta.skor) || 0) / TOTAL_SOAL) * 100, 100);

                    // Pewarnaan Mode Terang (Light Mode)
                    if (index === 0) { 
                        gayaKhusus = "peringkat-1 shadow-lg shadow-amber-500/10 font-bold z-10 relative"; 
                        ikonMahkota = '<i class="fas fa-crown text-amber-500 text-lg mr-2 drop-shadow-sm"></i>'; 
                        warnaBatang = "bg-gradient-to-r from-amber-400 to-amber-500"; 
                        bgTrekBatang = "bg-amber-100 border-amber-200";
                    } else if (index === 1) { 
                        gayaKhusus = "peringkat-2 shadow-md font-bold z-0 relative"; 
                        ikonMahkota = '<i class="fas fa-medal text-slate-400 text-lg mr-2 drop-shadow-sm"></i>'; 
                        warnaBatang = "bg-gradient-to-r from-slate-400 to-slate-500";
                        bgTrekBatang = "bg-white border-slate-300";
                    } else if (index === 2) { 
                        gayaKhusus = "peringkat-3 shadow-md font-bold z-0 relative"; 
                        ikonMahkota = '<i class="fas fa-award text-orange-400 text-lg mr-2 drop-shadow-sm"></i>'; 
                        warnaBatang = "bg-gradient-to-r from-orange-400 to-orange-500";
                        bgTrekBatang = "bg-orange-100 border-orange-200";
                    } else { 
                        gayaKhusus = "bg-white hover:bg-slate-50 transition border-b border-slate-100 text-slate-700"; 
                        warnaBatang = "bg-gradient-to-r from-blue-500 to-indigo-500"; 
                        bgTrekBatang = "bg-slate-100 border-slate-200";
                    }

                    const barisHtml = `
                        <div class="grid grid-cols-12 gap-4 p-4 items-center ${gayaKhusus}">
                            <div class="col-span-1 text-center font-black text-lg opacity-80">#${index + 1}</div>
                            
                            <div class="col-span-4 truncate pr-2">
                                <div class="font-bold text-sm md:text-base truncate flex items-center">${ikonMahkota}${peserta.namaPeserta}</div>
                                <div class="text-xs text-slate-500 truncate mt-0.5"><i class="fas fa-school mr-1.5 opacity-70"></i>${peserta.asalSekolah}</div>
                            </div>
                            
                            <div class="col-span-5 px-2">
                                <div class="w-full ${bgTrekBatang} h-3.5 md:h-4 rounded-full overflow-hidden p-[2px] border shadow-inner">
                                    <div class="${warnaBatang} h-full rounded-full bar-animasi shadow-sm" style="width: ${persentase}%"></div>
                                </div>
                            </div>
                            
                            <div class="col-span-2 text-right font-black text-xl md:text-2xl tracking-tighter">
                                ${peserta.skor} <span class="text-[10px] md:text-xs font-bold opacity-50 tracking-normal ml-0.5">PTS</span>
                            </div>
                        </div>
                    `;
                    wadahPapan.innerHTML += barisHtml;
                });

            } catch (err) {
                console.log("Menunggu koneksi ulang database...", err);
            }
        }

        muatDataLeaderboard();
        setInterval(muatDataLeaderboard, 3000);
    </script>
</body>
</html>
