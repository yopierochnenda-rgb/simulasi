<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian HUT SPENSANECI 57 (CAT Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col justify-between text-gray-800">

    <header class="w-full p-4 flex justify-between items-center bg-indigo-700 text-white shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-white text-indigo-700 p-2 rounded-full w-10 h-10 flex items-center justify-center font-black shadow-md">57</div>
            <div>
                <h1 class="font-bold tracking-wide text-sm md:text-base">HUT SPENSANECI 57</h1>
                <p class="text-xs text-indigo-200">Mode Ujian CAT Bersistem</p>
            </div>
        </div>
        <div id="timerDisplay" class="hidden text-xs bg-red-500 px-4 py-2 rounded-lg font-bold animate-pulse"><i class="fas fa-clock mr-1"></i> Ujian Berlangsung</div>
    </header>

    <main class="flex-grow flex items-start justify-center p-4 md:p-6 w-full max-w-6xl mx-auto">
        
        <div id="loginContainer" class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8 relative mt-10">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-t-2xl"></div>
            
            <div class="text-center mb-6 flex flex-col items-center">
                <img src="logo.png" alt="Logo SPENSANECI" class="w-24 h-24 object-contain mb-4 drop-shadow-md">
                <span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Konfirmasi Peserta</span>
                <h2 class="text-2xl font-bold text-gray-800 mt-3">Lomba Mata Pelajaran</h2>
            </div>

            <form onsubmit="startExam(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nomor Peserta</label>
                    <input type="text" id="noPeserta" required placeholder="Contoh: 057-001" class="w-full px-4 py-3 border rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="namaPeserta" required placeholder="Masukkan nama" class="w-full px-4 py-3 border rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Asal Sekolah</label>
                    <input type="text" id="asalSekolah" required placeholder="Contoh: SDN 1 Suka Maju" class="w-full px-4 py-3 border rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                </div>
                <button type="submit" id="startBtn" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-indigo-700 transition flex items-center justify-center space-x-2">
                    <span>Mulai Ujian Sekarang</span> <i class="fas fa-sign-in-alt text-sm"></i>
                </button>
            </form>
        </div>

        <div id="quizContainer" class="hidden w-full flex-col md:flex-row gap-6">
            
            <div class="flex-grow bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-slate-200">
                <div class="flex justify-between items-center border-b pb-4 mb-6">
                    <div>
                        <p class="text-xs text-slate-500 uppercase font-semibold tracking-wider">Identitas</p>
                        <p class="font-bold text-indigo-700"><span id="displayNama"></span></p>
                    </div>
                    <div class="text-right">
                        <span id="questionNumber" class="bg-indigo-100 text-indigo-800 font-bold px-4 py-1.5 rounded-lg text-sm border border-indigo-200">Soal 1</span>
                    </div>
                </div>

                <div id="imageWrapper" class="hidden w-full mb-6 flex justify-center bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <img id="questionImage" src="" alt="Soal" class="max-h-64 object-contain rounded-lg shadow-sm" onerror="this.parentElement.classList.add('hidden')">
                </div>
                
                <h3 id="questionText" class="text-lg md:text-xl font-bold text-gray-800 mb-6 whitespace-pre-wrap leading-relaxed">Memuat soal...</h3>
                
                <div id="optionsContainer" class="flex flex-col space-y-3 mb-8"></div>
                
                <div class="pt-5 border-t border-slate-200 flex flex-wrap justify-between items-center gap-4">
                    <button id="prevBtn" onclick="prevQuestion()" class="bg-slate-100 text-slate-700 font-semibold py-2.5 px-5 rounded-xl border border-slate-300 hover:bg-slate-200 transition flex items-center space-x-2">
                        <i class="fas fa-chevron-left text-xs"></i> <span>Sebelumnya</span>
                    </button>
                    
                    <label class="flex items-center space-x-2 cursor-pointer bg-yellow-50 opacity-100 px-4 py-2.5 rounded-xl border border-yellow-400 hover:bg-yellow-100 transition">
                        <input type="checkbox" id="raguCheckbox" onchange="toggleRagu()" class="w-5 h-5 accent-yellow-500 rounded cursor-pointer">
                        <span class="font-bold text-yellow-700 text-sm">Ragu-ragu</span>
                    </label>
                    
                    <button id="nextBtn" onclick="nextQuestion()" class="bg-indigo-600 text-white font-semibold py-2.5 px-6 rounded-xl hover:bg-indigo-700 shadow-md transition flex items-center space-x-2">
                        <span>Selanjutnya</span> <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="w-full md:w-80 bg-white rounded-2xl shadow-xl p-6 border border-slate-200 h-fit sticky top-6">
                <h3 class="font-bold text-gray-800 text-center mb-4 border-b pb-2">Navigasi Soal</h3>
                
                <div class="flex justify-center space-x-4 mb-4 text-[10px] font-bold text-slate-500 uppercase">
                    <div class="flex items-center"><span class="w-3 h-3 bg-red-500 rounded-sm mr-1"></span> Belum</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-green-500 rounded-sm mr-1"></span> Sudah</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-yellow-400 rounded-sm mr-1"></span> Ragu</div>
                </div>

                <div id="nomorCat" class="grid grid-cols-5 gap-2 mb-6"></div>

                <button onclick="akhiriUjian()" class="w-full bg-red-100 text-red-700 border border-red-300 font-bold py-3 rounded-xl hover:bg-red-500 hover:text-white transition shadow-sm flex items-center justify-center space-x-2">
                    <i class="fas fa-flag-checkered"></i> <span>Akhiri Ujian</span>
                </button>
            </div>
        </div>

        <div id="resultContainer" class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8 text-center hidden mt-10">
            <div class="text-emerald-500 text-6xl mb-4"><i class="fas fa-check-circle"></i></div>
            <h2 class="text-2xl font-bold text-gray-800">Ujian Telah Selesai!</h2>
            <p class="text-slate-500 text-sm mt-2">Terima kasih atas partisipasi Anda.</p>
            <div class="my-6 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                <p class="text-xs text-slate-400 uppercase font-bold tracking-widest">Skor Akhir Anda</p>
                <h1 id="finalScore" class="text-6xl font-black text-indigo-600 mt-2">0</h1>
            </div>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 transition shadow-lg">Kembali ke Beranda</button>
        </div>
    </main>

    <footer class="w-full text-center p-4 text-xs text-indigo-400 bg-slate-900 border-t border-slate-800">&copy; 2026 Panitia HUT SPENSANECI 57.</footer>

    <script>
        const URL_SISTEM = "https://script.google.com/macros/s/AKfycbzRHQYR_71ygdOjv5GFnbp04uvxNR_IU_GrVAo7OXyoU-p20bAzzFy4f_I4ZEka3VnK/exec";

        let bankSoal = [];
        let urutanSoal = [];
        let indexSekarang = 0;
        let skor = 0;
        let skorPerNomor = {};
        
        let riwayatJawabanSiswa = {}; 
        let riwayatRagu = {};         

        async function startExam(event) {
            event.preventDefault();
            const btn = document.getElementById('startBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Mengambil Soal...`;
            btn.disabled = true;

            try {
                const respon = await fetch(URL_SISTEM + "?p=soal");
                bankSoal = await respon.json();

                if (bankSoal.length === 0) {
                    alert("Bank soal kosong! Mohon periksa susunan kolom Google Sheets Anda.");
                    location.reload(); return;
                }

                const jumlahSoalLomba = bankSoal.length; 
                urutanSoal = bankSoal.sort(() => 0.5 - Math.random()).slice(0, jumlahSoalLomba);

                document.getElementById('displayNama').innerText = document.getElementById('namaPeserta').value;

                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('timerDisplay').classList.remove('hidden');
                document.getElementById('quizContainer').classList.remove('hidden');
                document.getElementById('quizContainer').classList.add('flex'); 

                tampilkanSoal();
            } catch (err) {
                alert("Gagal koneksi. Cek internet!"); location.reload();
            }
        }

        function renderPaletCAT() {
            const palet = document.getElementById('nomorCat');
            palet.innerHTML = "";

            urutanSoal.forEach((soal, i) => {
                const btn = document.createElement('button');
                btn.innerText = i + 1;
                
                const sudahDijawab = riwayatJawabanSiswa[i] !== undefined && riwayatJawabanSiswa[i] !== null;
                const lagiRagu = riwayatRagu[i] === true;

                let kelasWarna = "bg-red-500 text-white border-red-600"; 
                if (lagiRagu) {
                    kelasWarna = "bg-yellow-400 text-yellow-900 border-yellow-500"; 
                } else if (sudahDijawab) {
                    kelasWarna = "bg-green-500 text-white border-green-600"; 
                }

                btn.className = `w-full aspect-square flex items-center justify-center rounded-lg font-bold border-b-4 transition hover:brightness-110 shadow-sm text-sm ${kelasWarna}`;
                
                if (i === indexSekarang) {
                    btn.classList.add('ring-4', 'ring-indigo-300', 'scale-105', 'z-10');
                }

                btn.onclick = () => lompatKeSoal(i);
                palet.appendChild(btn);
            });
        }

        function lompatKeSoal(nomorIndex) {
            indexSekarang = nomorIndex;
            tampilkanSoal();
        }

        function toggleRagu() {
            const centang = document.getElementById('raguCheckbox').checked;
            riwayatRagu[indexSekarang] = centang;
            renderPaletCAT(); 
        }

        function tampilkanSoal() {
            renderPaletCAT(); 
            
            const jawabanDipilih = riwayatJawabanSiswa[indexSekarang] || null;
            const soalAktif = urutanSoal[indexSekarang];
            
            document.getElementById('questionNumber').innerText = `Soal ${indexSekarang + 1} / ${urutanSoal.length}`;
            
            const prevBtn = document.getElementById('prevBtn');
            prevBtn.style.visibility = (indexSekarang === 0) ? "hidden" : "visible";

            document.getElementById('raguCheckbox').checked = riwayatRagu[indexSekarang] || false;

            const imageWrapper = document.getElementById('imageWrapper');
            const questionImage = document.getElementById('questionImage');
            if (soalAktif.image && soalAktif.image.trim() !== "") {
                questionImage.src = soalAktif.image;
                imageWrapper.classList.remove('hidden');
            } else {
                imageWrapper.classList.add('hidden'); questionImage.src = "";
            }

            document.getElementById('questionText').innerText = soalAktif.text;

            const pilihanHtml = document.getElementById('optionsContainer');
            pilihanHtml.innerHTML = "";
            
            const daftarOpsi = [
                { kode: "A", teks: soalAktif.opsiA },
                { kode: "B", teks: soalAktif.opsiB },
                { kode: "C", teks: soalAktif.opsiC },
                { kode: "D", teks: soalAktif.opsiD }
            ];

            daftarOpsi.forEach(opsi => {
                const button = document.createElement('button');
                button.innerHTML = `<span class="inline-block bg-slate-100 text-slate-700 font-bold px-3 py-1.5 rounded-lg mr-3 abjad-kotak">${opsi.kode}</span> <span class="text-left flex-grow">${opsi.teks}</span>`;
                
                if (jawabanDipilih === opsi.kode) {
                    button.className = "w-full flex items-center p-3.5 bg-indigo-600 border-2 border-indigo-600 rounded-xl text-white font-semibold text-base shadow-md transition";
                    button.querySelector('.abjad-kotak').className = "inline-block bg-indigo-800 text-white font-bold px-3 py-1.5 rounded-lg mr-3 abjad-kotak shadow-inner";
                } else {
                    button.className = "w-full flex items-center p-3.5 border-2 border-slate-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 font-medium transition text-base text-gray-700 bg-white";
                }
                
                button.onclick = () => pilihJawaban(button, opsi.kode);
                pilihanHtml.appendChild(button);
            });
        }

        function pilihJawaban(elemenTombol, nilaiOpsi) {
            riwayatJawabanSiswa[indexSekarang] = nilaiOpsi; 
            
            const semuaTombol = document.getElementById('optionsContainer').children;
            for (let btn of semuaTombol) { 
                btn.className = "w-full flex items-center p-3.5 border-2 border-slate-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 font-medium transition text-base text-gray-700 bg-white";
                btn.querySelector('.abjad-kotak').className = "inline-block bg-slate-100 text-slate-700 font-bold px-3 py-1.5 rounded-lg mr-3 abjad-kotak";
            }
            
            elemenTombol.className = "w-full flex items-center p-3.5 bg-indigo-600 border-2 border-indigo-600 rounded-xl text-white font-semibold text-base shadow-md transition";
            elemenTombol.querySelector('.abjad-kotak').className = "inline-block bg-indigo-800 text-white font-bold px-3 py-1.5 rounded-lg mr-3 abjad-kotak shadow-inner";
            
            renderPaletCAT(); 
            
            const soalAktif = urutanSoal[indexSekarang];
            skorPerNomor[indexSekarang] = (nilaiOpsi === soalAktif.answer) ? 1 : 0;
            skor = Object.values(skorPerNomor).reduce((a, b) => a + b, 0);

            fetch(URL_SISTEM, {
                method: "POST",
                body: JSON.stringify({
                    noPeserta: document.getElementById('noPeserta').value,
                    namaPeserta: document.getElementById('namaPeserta').value,
                    asalSekolah: document.getElementById('asalSekolah').value,
                    skor: skor
                }),
                mode: "no-cors"
            }).catch(e => console.log(e));
        }

        function nextQuestion() {
            if (indexSekarang < urutanSoal.length - 1) {
                indexSekarang++; tampilkanSoal();
            } else {
                akhiriUjian();
            }
        }

        function prevQuestion() {
            if (indexSekarang > 0) {
                indexSekarang--; tampilkanSoal();
            }
        }

        function akhiriUjian() {
            const konfirmasi = confirm("YAKIN INGIN MENGAKHIRI UJIAN?\n\nPastikan Anda sudah mengecek kembali soal-soal yang berwarna merah (Belum dijawab) atau kuning (Ragu-ragu).");
            if (konfirmasi) {
                document.getElementById('quizContainer').classList.remove('flex');
                document.getElementById('quizContainer').classList.add('hidden');
                document.getElementById('timerDisplay').classList.add('hidden');
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('finalScore').innerText = skor;
            }
        }
    </script>
</body>
</html>
